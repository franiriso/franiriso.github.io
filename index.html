<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Fran Iriso portfolio: embedded systems, robotics, autonomous systems, medical devices, and multidisciplinary engineering."
  >
  <title>Fran Iriso | Engineering Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
  >
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <div class="backdrop" aria-hidden="true">
      <div class="backdrop__glow"></div>
    </div>

    <header class="topbar">
      <a class="topbar__brand" href="#home" data-jump="home">Fran Iriso</a>
      <nav class="tab-nav" aria-label="Portfolio sections" id="tab-nav" role="tablist"></nav>
    </header>

    <aside class="side-nav" id="side-nav" aria-label="Section rail navigation"></aside>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile section navigation"></nav>

    <div class="content-wrap">
      <header class="hero" id="top">
        <div class="hero__copy" id="hero-copy"></div>
        <div class="hero__photo" id="photo-panel"></div>
      </header>
      <header class="section-head" id="section-head" hidden>
        <p class="section-head__kicker" id="section-head-kicker"></p>
        <h2 class="section-head__title" id="section-head-title"></h2>
      </header>

      <main class="tab-panels">
        <section
          class="tab-panel is-active"
          id="panel-home"
          data-panel="home"
          role="tabpanel"
          aria-labelledby="tab-home"
        >
          <div class="panel-grid panel-grid--home">
            <div class="panel-card panel-card--wide" id="about-panel"></div>
            <div class="panel-card panel-card--wide" id="tech-panel"></div>
            <div class="panel-card panel-card--wide" id="languages-panel"></div>
          </div>
        </section>

        <section
          class="tab-panel"
          id="panel-resume"
          data-panel="resume"
          role="tabpanel"
          aria-labelledby="tab-resume"
          hidden
        >
          <div class="panel-grid panel-grid--resume">
            <div class="panel-card panel-card--wide" id="experience-panel"></div>
            <div class="panel-card panel-card--wide" id="education-panel"></div>
          </div>
        </section>

        <section
          class="tab-panel"
          id="panel-projects"
          data-panel="projects"
          role="tabpanel"
          aria-labelledby="tab-projects"
          hidden
        >
          <div class="panel-grid panel-grid--projects">
            <div class="panel-card panel-card--wide" id="projects-panel"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
